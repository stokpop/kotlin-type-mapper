name: Release to Maven Central

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set version from gradle.properties
        run: |
          VERSION=$(grep '^version=' gradle.properties | cut -d'=' -f2)
          echo "TAG_NAME=$VERSION" >> $GITHUB_ENV

      # if no tag exists, this is expected to fail
      - name: Switch to git tag for release
        if: contains(env.TAG_NAME, 'SNAPSHOT') != true
        run: |
          git fetch --all --tags
          git checkout tags/${{ env.TAG_NAME }} -b ${{ env.TAG_NAME }}-tmp-branch

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: 'corretto'

      - name: Publish to Maven Central (snapshot)
        if: contains(env.TAG_NAME, 'SNAPSHOT') == true
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_SIGNING_PASSWORD }}
        run: ./gradlew --info clean publishToMavenCentral

      - name: Publish to Maven Central (release, manual approval required)
        if: contains(env.TAG_NAME, 'SNAPSHOT') != true
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_SIGNING_PASSWORD }}
        run: |
          ./gradlew --info publishToMavenCentral
          echo "Deployment uploaded. Go to https://central.sonatype.com/publishing/deployments and click Publish."

      - name: Build CLI shadow jar
        if: contains(env.TAG_NAME, 'SNAPSHOT') != true
        run: ./gradlew :cli:shadowJar

      - name: Create GitHub release
        uses: ncipollo/release-action@v1
        if: contains(env.TAG_NAME, 'SNAPSHOT') != true
        with:
          artifacts: "model/build/libs/*.jar,analyzer/build/libs/*.jar,cli/build/libs/*.jar"
          bodyFile: RELEASE.md
          token: ${{ secrets.GITHUB_TOKEN }}
